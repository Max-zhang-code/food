dod:
  commands:
    - id: CMD-001
      command: "npm run dev:mp-weixin"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "npm run lint"
      core: false
      failure_handling: fix-or-block
  evidence_required: [screenshots, database_query_log, cloud_function_test_log]
  cleanliness:
    debug_output: forbidden
    todo_fixme: forbidden
    dead_imports: forbidden
